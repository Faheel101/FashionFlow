version: 2

models:
  - name: fct_orders
    description: >
      Order-level fact table combining orders, customers, line items,
      payments, and refunds into a single analytical model.
    columns:
      - name: order_id
        tests: [unique, not_null]
      - name: order_number
        tests: [unique, not_null]
      - name: customer_id
        tests: [not_null]
      - name: order_status
        tests:
          - accepted_values:
              values: ['pending', 'confirmed', 'processing', 'shipped', 'delivered', 'cancelled', 'returned']
      - name: order_total
        tests: [not_null]
      - name: order_date
        tests: [not_null]

  - name: fct_daily_marketing_performance
    description: >
      Daily marketing performance fact table joining campaigns, ad sets,
      ads, and daily metrics with calculated ROAS, CPA, and conversion rates.
    columns:
      - name: performance_id
        tests: [unique, not_null]
      - name: campaign_id
        tests: [not_null]
      - name: ad_id
        tests: [not_null]
      - name: performance_date
        tests: [not_null]
